# ============================================================
# hparams.yaml  —  Single source of truth for ALL parameters
# Energy-Aware Telecom Tower Management via Inventory-Inspired RL
# Sangeeta Gupta | CH24M562 | IIT Madras | Phase 3
#
# RULE: Every constant used in telecom_env.py, train_rlinv.py,
#       evaluate.py, or any baseline MUST be defined here.
#       No hardcoded values anywhere in the codebase.
#       If you change a value, change it here only.
# ============================================================


# ── Environment: Physical constants ─────────────────────────
env:
  dt_hours: 1.0                  # hourly resolution

  # Battery
  soc_min: 0.20                  # minimum allowed SoC (hard constraint)
  soc_max: 1.00                  # maximum allowed SoC

  # Diesel inventory
  tank_hours: 72.0               # C_tank = tank_hours × d_bar (kWh-equiv)
  q_small_pct: 0.30              # small order = 30% of tank capacity
  q_large_pct: 0.60              # large order = 60% of tank capacity

  # DG minimum run fuel (masking constraint)
  dg_min_fuel_hrs: 2.0           # DG must have fuel to run for at least 2h
  dg_min_fuel_safety: 1.20       # 20% safety margin on top of min fuel

  # Observation normalisation caps (manual pre-normalisation)
  obs_pv_max: 15.0               # cap for PV normalisation
  obs_load_max: 12.0             # cap for load normalisation

  # Episode lengths
  train_episode_len: 720         # steps = 30 days × 24h
  eval_episode_len: 720          # must match train for fair comparison

  # Train/test split — FIXED from Phase 2 bug
  train_days: 45                 # 45 days training
  test_days: 15                  # 15 days test
  train_len_steps: 1080          # = 45 × 24  (authoritative — use this, not min())

  # Initial inventory (training vs evaluation)
  init_inv_frac_train_low:  0.20  # Phase 3: randomise from 0.20–0.90 during training
  init_inv_frac_train_high: 0.90  # agent learns to manage from any starting inventory
  init_inv_frac_eval_low: 0.30   # evaluation randomises over [0.30, 0.90]
  init_inv_frac_eval_high: 0.90


# ── Environment: Lead time scenarios ────────────────────────
lead_time:
  # Geometric distribution: Bernoulli(p) each hour
  # Mean delivery = 1/p hours
  fast:
    p: 0.08333                   # 1/12 → mean 12h
    mean_hours: 12
  normal:
    p: 0.04167                   # 1/24 → mean 24h
    mean_hours: 24
  delayed:
    p: 0.02083                   # 1/48 → mean 48h
    mean_hours: 48
  very_delayed:
    p: 0.00833                   # 1/120 → mean 5 days (robustness stress test)
    mean_hours: 120

  monsoon:
    p: 0.01389                   # 1/72 → mean 72h — heavy monsoon, rural India
    mean_hours: 72               # between delayed and very_delayed; fills curve gap

  no_delay:
    p: 1.00000                   # instant delivery — ideal performance upper bound
    mean_hours: 0
  extreme:
    p: 0.00298                   # 1/336 → mean 14 days — conflict/disaster stress test
    mean_hours: 336

  # Multi-scenario training (Phase 3)
  # At each episode reset, sample uniformly from this list
  multi_scenario_pool: ["fast", "normal", "delayed"]


# ── Reward function ──────────────────────────────────────────
reward:
  # r = -alpha*(DG/d_bar) - beta*(Grid/d_bar) - lam*(Unmet/d_bar)
  #     - gamma_r * stockout_flag - mu * violation_flag
  alpha: 1.0                     # diesel energy cost weight
  beta: 0.4                      # grid energy cost weight
  lam: 100.0                     # unmet load penalty (12× worse than running DG at site5)
  gamma_r: 200.0                 # stockout cliff (= 2×lam: qualitatively different failure)
  mu: 20.0                       # physical violation penalty (SoC clip, tank overflow)


# ── PPO algorithm ────────────────────────────────────────────
ppo:
  # These are the ACTUAL values used in Phase 2 training.
  # gamma=0.99 is authoritative (presentation slide showed 0.995 — that was the plan).
  learning_rate: 0.0003          # 3e-4 with linear decay
  lr_schedule: "linear"
  n_steps: 2048                  # rollout buffer length per env
  batch_size: 256                # CPU-friendly mini-batch
  gamma: 0.99                    # discount factor — effective horizon ~100h
  gae_lambda: 0.95               # GAE λ — bias/variance balance
  clip_range: 0.2                # PPO clip ratio
  ent_coef: 0.01                 # entropy bonus for exploration
  vf_coef: 0.5                   # value function loss coefficient
  max_grad_norm: 0.5             # gradient clipping
  n_epochs: 10                   # PPO inner loop passes per update


# ── Policy network ───────────────────────────────────────────
policy:
  net_arch: [256, 256]           # flat MLP — two hidden layers
  activation: "ReLU"             # activation function
  obs_clip: 10.0                 # VecNormalize clip_obs parameter


# ── Training execution ───────────────────────────────────────
training:
  total_timesteps: 400000        # Phase 2 verified convergence at 400K
  total_timesteps_multi: 500000  # multi-scenario harder — 25% more steps
  n_envs: 4                      # SubprocVecEnv workers (reduced from 8 due to OS limits)
  eval_freq: 10000               # evaluation callback fires every 10K steps
  n_eval_episodes: 3             # episodes per callback evaluation
  seeds: [42, 123, 777]          # Phase 2 seeds (keep for reproducibility)

  # Phase 3 extended seeds — all RL experiments
  seeds_phase3: [42, 123, 777, 7, 13, 21, 99, 314, 500, 999]


# ── Evaluation ───────────────────────────────────────────────
evaluation:
  n_episodes: 30                 # episodes per seed at evaluation
  scenarios_to_eval:             # evaluate every trained policy on all these
    - "normal"
    - "delayed"
    - "very_delayed"             # Phase 3 stress test
    - "extreme"                  # Phase 3 disaster scenario
    - "no_delay"                 # ideal benchmark — upper bound


# ── (s,S) inventory rule — used in TrackB, A6, B1 ───────────
sS_policy:
  # s = d_bar × (lead_time_mean_hours + safety_buffer_hours)
  # S = order_up_to_pct × C_tank
  safety_buffer_hours: 48.0      # explicit safety stock for lead time uncertainty
  order_up_to_pct: 0.85          # S = 0.85 × C_tank


# ── Experiment registry ──────────────────────────────────────
registry:
  output_csv: "results/experiment_registry.csv"
  columns:
    - experiment_tag              # e.g. "phase3_multiscenario"
    - policy                      # RLInv, TrackB, A5, A6, A7, B0, B1, DQN, MPC
    - site
    - seed
    - lead_scenario               # normal, delayed, very_delayed, multi
    - train_scenario              # what was used at training time
    - EENS_kWh
    - diesel_kWh
    - uptime_pct
    - mean_inv_pct
    - orders_placed
    - stockout_events
    - violations
    - timestamp
    - git_commit                  # auto-populated from git log
    - tank_scale                  # 1.0=base 72h, 1.33=96h, 2.0=144h
    - lead_dist                   # geometric or lognormal
    - use_time_enc                # True/False — time encoding ablation


# ── Reward sensitivity variants (Phase 3) ────────────────────
# Base values: alpha=1.0, beta=0.4, lam=100, gamma_r=200, mu=20
# Approach: vary ONE component at 0.5× and 2× base while holding others fixed.
# Scientific basis: controlled perturbation (±50%) is standard sensitivity analysis.
# Economic grounding: lam range covers GSMA tower downtime cost spectrum.
sensitivity:
  base:
    alpha: 1.0
    beta: 0.4
    lam: 100.0
    gamma_r: 200.0
    mu: 20.0

  # λ sweep — primary (reviewer requested, economically grounded)
  lam_low:     { alpha: 1.0, beta: 0.4, lam:  50.0, gamma_r: 100.0, mu: 20.0 }  # 0.5× base
  lam_high:    { alpha: 1.0, beta: 0.4, lam: 200.0, gamma_r: 400.0, mu: 20.0 }  # 2× base
  lam_vlow:    { alpha: 1.0, beta: 0.4, lam:  25.0, gamma_r:  50.0, mu: 20.0 }  # 0.25× base
  lam_vhigh:   { alpha: 1.0, beta: 0.4, lam: 500.0, gamma_r: 1000.0, mu: 20.0 } # 5× base

  # γ_r cliff sweep — secondary (tests if cliff-to-lambda ratio matters)
  cliff_low:   { alpha: 1.0, beta: 0.4, lam: 100.0, gamma_r: 100.0, mu: 20.0 }  # γ_r = λ
  cliff_high:  { alpha: 1.0, beta: 0.4, lam: 100.0, gamma_r: 400.0, mu: 20.0 }  # γ_r = 4λ

  # β grid cost sweep (SERC tariff variation across Indian states)
  beta_low:    { alpha: 1.0, beta: 0.2, lam: 100.0, gamma_r: 200.0, mu: 20.0 }  # cheap grid
  beta_high:   { alpha: 1.0, beta: 0.8, lam: 100.0, gamma_r: 200.0, mu: 20.0 }  # expensive grid

  # μ violation penalty (should be insensitive — confirms masking works)
  mu_low:      { alpha: 1.0, beta: 0.4, lam: 100.0, gamma_r: 200.0, mu:  5.0 }  # 0.25× base
  mu_high:     { alpha: 1.0, beta: 0.4, lam: 100.0, gamma_r: 200.0, mu: 50.0 }  # 2.5× base


# ── Discount factor variants (Phase 3) ───────────────────────
# gamma=0.99 is the implemented value. Test if longer horizon (0.995) helps.
gamma_variants:
  gamma_short:  0.95    # horizon ~20h — myopic, 2 lead cycles
  gamma_base:   0.99    # horizon ~100h — 4 lead cycles (IMPLEMENTED)
  gamma_long:   0.995   # horizon ~200h — 8 lead cycles (was in PPT)


# ── Lognormal lead time distribution (Phase 3) ───────────────
# Lognormal is more realistic than Geometric: captures tail events,
# has memory (hours_since_order IS informative — delivery_remaining_n dim).
# Mean is matched to geometric scenario (1/p hours) so scenarios are comparable.
# E[Lognormal(mu, sigma)] = mean_hours  =>  mu = ln(mean_hours) - sigma^2/2
lognormal:
  sigma: 0.5            # shape param — moderate variability (CV ≈ 0.53 at sigma=0.5)
  # sigma=0.5: P(delivery < 0.5×mean) ≈ 17%, P(delivery > 2×mean) ≈ 9%
  # sigma=0.8: heavier tail — disaster/monsoon scenarios
  sigma_heavy: 0.8      # heavy-tail variant for stress tests


# ── Tank capacity sensitivity (Phase 3) ──────────────────────
# Vary tank_hours via a scale multiplier on the base 72h capacity.
# Scientific question: at what tank size does inventory management become trivial?
# (RLInv advantage should disappear when tank >> lead_time × demand_rate)
tank_sensitivity:
  base_hours: 72.0                          # baseline (used everywhere else)
  scales: [0.67, 1.0, 1.33, 2.0]           # → {48h, 72h, 96h, 144h} × d_bar
  labels: ["48h", "72h_base", "96h", "144h"]
  # Sites: site5, site10 (constrained) × 3 seeds × normal logistics
  # Expected: RLInv advantage largest at 48h (tight buffer), vanishes near 144h